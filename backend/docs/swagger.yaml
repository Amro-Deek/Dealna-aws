definitions:
  domain.Attachment:
    properties:
      file_path:
        type: string
      id:
        type: string
      item_id:
        type: string
      uploaded_at:
        type: string
    type: object
  domain.Category:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  domain.CreateItemCommand:
    properties:
      category_id:
        type: string
      description:
        type: string
      object_keys:
        description: S3 keys pointing to uploaded images
        items:
          type: string
        type: array
      owner_id:
        type: string
      pickup_location:
        type: string
      price:
        type: number
      title:
        type: string
    type: object
  domain.FeedItem:
    properties:
      category_id:
        type: string
      category_name:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      owner_display_name:
        type: string
      owner_id:
        type: string
      owner_profile_pic_url:
        type: string
      pickup_location:
        type: string
      price:
        type: number
      status:
        $ref: '#/definitions/domain.ItemStatus'
      thumbnail_url:
        type: string
      title:
        type: string
    type: object
  domain.Follow:
    properties:
      displayName:
        type: string
      followedAt:
        type: string
      followerProfileID:
        type: string
      followingProfileID:
        type: string
      profilePictureURL:
        type: string
    type: object
  domain.Item:
    properties:
      category_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      owner_id:
        type: string
      pickup_location:
        type: string
      price:
        type: number
      status:
        $ref: '#/definitions/domain.ItemStatus'
      title:
        type: string
      updated_at:
        type: string
    type: object
  domain.ItemDetail:
    properties:
      attachments:
        items:
          $ref: '#/definitions/domain.Attachment'
        type: array
      category_id:
        type: string
      category_name:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      owner_display_name:
        type: string
      owner_id:
        type: string
      owner_profile_pic_url:
        type: string
      pickup_location:
        type: string
      price:
        type: number
      status:
        $ref: '#/definitions/domain.ItemStatus'
      thumbnail_url:
        type: string
      title:
        type: string
    type: object
  domain.ItemStatus:
    enum:
    - AVAILABLE
    - RESERVED
    - SOLD
    type: string
    x-enum-varnames:
    - ItemStatusAvailable
    - ItemStatusReserved
    - ItemStatusSold
  domain.PurchaseRequest:
    properties:
      buyerID:
        type: string
      createdAt:
        type: string
      itemID:
        type: string
      requestID:
        type: string
      status:
        $ref: '#/definitions/domain.PurchaseRequestStatus'
      updatedAt:
        type: string
    type: object
  domain.PurchaseRequestStatus:
    enum:
    - PENDING
    - ACCEPTED
    - REJECTED
    - FROZEN
    - CANCELLED
    type: string
    x-enum-varnames:
    - PurchaseRequestPending
    - PurchaseRequestAccepted
    - PurchaseRequestRejected
    - PurchaseRequestFrozen
    - PurchaseRequestCancelled
  domain.QueueEntry:
    properties:
      entryID:
        type: string
      entryStatus:
        $ref: '#/definitions/domain.QueueEntryStatus'
      itemID:
        type: string
      joinedAt:
        type: string
      turnStartedAt:
        type: string
      userID:
        type: string
    type: object
  domain.QueueEntryStatus:
    enum:
    - WAITING
    - RESERVED
    - EXPIRED
    - COMPLETED
    - CANCELLED
    type: string
    x-enum-varnames:
    - QueueStatusWaiting
    - QueueStatusReserved
    - QueueStatusExpired
    - QueueStatusCompleted
    - QueueStatusCancelled
  dto.CompleteStudentRegistrationRequest:
    properties:
      academicYear:
        type: integer
      displayName:
        type: string
      email:
        type: string
      major:
        type: string
      password:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.LoginUser'
    type: object
  dto.LoginUser:
    properties:
      email:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  dto.MeResponse:
    description: Current authenticated user
    properties:
      email:
        example: user@bzu.edu
        type: string
      id:
        example: b3c2f9a1
        type: string
      role:
        example: STUDENT
        type: string
    type: object
  dto.RefreshRequest:
    properties:
      refreshToken:
        type: string
    type: object
  dto.RefreshResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  dto.RequestActivationRequest:
    properties:
      email:
        type: string
    type: object
  dto.ResendActivationRequest:
    properties:
      email:
        type: string
    type: object
  dto.StudentRegistrationStatusResponse:
    properties:
      can_complete_registration:
        type: boolean
      email:
        type: string
      expires_at:
        type: string
      is_used:
        type: boolean
      is_verified:
        type: boolean
      verified_at:
        type: string
    type: object
  middleware.ErrCode:
    enum:
    - USER_NOT_FOUND
    - EMAIL_ALREADY_USED
    - INVALID_CREDENTIALS
    - ACCOUNT_SUSPENDED
    - EMAIL_NOT_VERIFIED
    - UNAUTHORIZED
    - FORBIDDEN
    - TOKEN_INVALID
    - TOKEN_EXPIRED
    - LISTING_NOT_FOUND
    - LISTING_CLOSED
    - LISTING_LIMIT_REACHED
    - ALREADY_REVIEWED
    - REVIEW_NOT_ALLOWED
    - VALIDATION_FAILED
    - INVALID_INPUT
    - CONFLICT
    - RATE_LIMITED
    - DATABASE_ERROR
    - INTERNAL_ERROR
    type: string
    x-enum-varnames:
    - CodeUserNotFound
    - CodeEmailAlreadyUsed
    - CodeInvalidCredentials
    - CodeAccountSuspended
    - CodeEmailNotVerified
    - CodeUnauthorized
    - CodeForbidden
    - CodeTokenInvalid
    - CodeTokenExpired
    - CodeListingNotFound
    - CodeListingClosed
    - CodeListingLimitReached
    - CodeAlreadyReviewed
    - CodeReviewNotAllowed
    - CodeValidationFailed
    - CodeInvalidInput
    - CodeConflict
    - CodeRateLimited
    - CodeDatabaseError
    - CodeInternalError
  middleware.ErrorFrame:
    properties:
      code:
        $ref: '#/definitions/middleware.ErrCode'
      correlationId:
        type: string
      details:
        additionalProperties: {}
        type: object
      message:
        type: string
      retryable:
        type: boolean
      statusCode:
        type: integer
      ts:
        type: integer
      type:
        type: string
      version:
        type: string
    type: object
  profile.GenerateUploadURLReq:
    properties:
      content_type:
        type: string
      filename:
        type: string
    type: object
  profile.UpdateProfileReq:
    properties:
      bio:
        type: string
      display_name:
        type: string
      profile_picture_url:
        type: string
    type: object
  profile.UpdateStudentReq:
    properties:
      academic_year:
        type: integer
      major:
        type: string
    type: object
  services.ProfileDTO:
    properties:
      academic_year:
        type: integer
      bio:
        type: string
      display_name:
        type: string
      display_name_last_changed_at:
        type: string
      email:
        type: string
      follower_count:
        type: integer
      following_count:
        type: integer
      major:
        description: Student specific
        type: string
      profile_id:
        type: string
      profile_picture_url:
        type: string
      rating_count:
        type: integer
      role:
        type: string
      sold_items_count:
        type: integer
      student_id:
        type: string
      total_reviews_count:
        type: integer
      user_id:
        type: string
    type: object
info:
  contact:
    name: Amro Deek
  description: Dealna backend API
  title: Dealna API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user via Keycloak and return access & refresh tokens
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Login
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke current session
      parameters:
      - description: Refresh payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      parameters:
      - description: Refresh payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Refresh token
      tags:
      - Auth
  /api/v1/auth/student/activate:
    get:
      description: Check activation link validity
      parameters:
      - description: Activation token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Verify activation token
      tags:
      - Auth
  /api/v1/auth/student/complete:
    post:
      consumes:
      - application/json
      description: Finalize student account
      parameters:
      - description: Registration data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CompleteStudentRegistrationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Complete registration
      tags:
      - Auth
  /api/v1/auth/student/request-activation:
    post:
      consumes:
      - application/json
      description: Send activation email to university address
      parameters:
      - description: Email
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RequestActivationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Request activation link
      tags:
      - Auth
  /api/v1/auth/student/resend:
    post:
      consumes:
      - application/json
      description: Resend activation email
      parameters:
      - description: Email
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ResendActivationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Resend activation link
      tags:
      - Auth
  /api/v1/auth/student/status:
    get:
      description: Check if student email is verified and registration can be completed
      parameters:
      - description: Student email
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.StudentRegistrationStatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Get registration status
      tags:
      - Auth
  /api/v1/categories:
    get:
      description: Returns all marketplace categories for dropdown selection. Public
        endpoint, no auth required.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Category'
            type: array
      summary: List Categories
      tags:
      - Metadata
  /api/v1/items:
    post:
      consumes:
      - application/json
      description: Mints a new item for sale. Enforces 5 listings per day limit (NFR-1).
      parameters:
      - description: Listing Details
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/domain.CreateItemCommand'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Item'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Create Item Listing
      tags:
      - Items
  /api/v1/items/{id}:
    delete:
      description: Soft-deletes a listing. Only the owner can delete. Preserves transaction
        history.
      parameters:
      - description: Item UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Delete Item
      tags:
      - Items
    get:
      description: Returns the full listing including attachments.
      parameters:
      - description: Item UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ItemDetail'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Get Item Detail
      tags:
      - Items
  /api/v1/items/{id}/status:
    patch:
      consumes:
      - application/json
      description: Transitions an item status (AVAILABLE → RESERVED → SOLD). Only
        the owner can update.
      parameters:
      - description: Item UUID
        in: path
        name: id
        required: true
        type: string
      - description: New status payload
        in: body
        name: status
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Update Item Status
      tags:
      - Items
  /api/v1/items/feed:
    get:
      description: Returns available items scoped automatically to the authenticated
        user's university. Newest first.
      parameters:
      - description: Items per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      - description: Full-text search on title
        in: query
        name: search
        type: string
      - description: Filter by category UUID
        in: query
        name: category_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.FeedItem'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Get Marketplace Feed
      tags:
      - Items
  /api/v1/items/my:
    get:
      description: Returns all items owned by the currently authenticated user.
      parameters:
      - description: Items per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.FeedItem'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Get My Listings
      tags:
      - Items
  /api/v1/items/picture/upload-url:
    post:
      description: Creates a pre-signed S3 URL for uploading item images.
      parameters:
      - description: MIME type (e.g. image/jpeg)
        in: query
        name: content_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Generate Item Image Upload URL
      tags:
      - Items
  /api/v1/profile:
    get:
      description: Primary entry point for mobile apps. Returns aggregated user info,
        student data, and the unique `profile_id` required for all social/follow actions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.ProfileDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: '[Self] Get My Profile'
      tags:
      - Profile
    put:
      consumes:
      - application/json
      description: Updates social identity fields like display name, bio, and finishing
        the S3 profile picture upload sync.
      parameters:
      - description: Profile Update Payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/profile.UpdateProfileReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: '[Self] Update Base Profile'
      tags:
      - Profile
  /api/v1/profile/picture/upload-url:
    post:
      consumes:
      - application/json
      description: "\U0001F4F1 **FLUTTER INTEGRATION WORKFLOW (3 STEPS):**\\n\\n**Step
        1 (The Secure Handshake):** Call this endpoint with `{\"filename\": \"pic.png\",
        \"content_type\": \"image/png\"}` to secure a ticket. It returns an `upload_url`
        and an `object_key`. Note: Ensure you store your `profile_id` returned from
        `GET /api/v1/profile` for all future social interactions.\\n\\n**Step 2 (The
        Direct Upload):** Bypass this backend entirely and upload your binary image
        file directly to AWS S3. Perform an HTTP `PUT` request targeting the `upload_url`
        you received. You MUST attach the exact same `Content-Type` header (e.g. `image/png`)
        to the `PUT` request. Do not send `FormData`, send raw binary data.\\n\\n**Step
        3 (Final Sync):** Once AWS gives you a `200 OK`, call `PUT /api/v1/profile`
        and set `\"profile_picture_url\"` to the `object_key` that was returned in
        Step 1. Your updated profile is now ready to be discovered via the public
        profile lookup."
      parameters:
      - description: File Info
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/profile.GenerateUploadURLReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Generate S3 Upload URL
      tags:
      - Profile
  /api/v1/profile/student:
    put:
      consumes:
      - application/json
      description: Specifically for student-only data. Updates the `major` and `academic_year`.
        This is decoupled from the base profile to separate academic status from social
        identity.
      parameters:
      - description: Student Update Payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/profile.UpdateStudentReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: '[Self] Update Academic Info'
      tags:
      - Profile
  /api/v1/users/{profileId}/profile:
    get:
      description: Fetch public-facing info of any user (display name, bio, counters).
        Use this to render the profile page of others before a follow action.
      parameters:
      - description: Profile ID
        in: path
        name: profileId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.ProfileDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "500":
          description: Internal Server Error
          schema:
