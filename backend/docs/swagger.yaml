  /api/v1/profile/picture/upload-url:
    post:
      consumes:
      - application/json
      description: "\U0001F4F1 **FLUTTER INTEGRATION WORKFLOW (3 STEPS):**\\n\\n**Step
        1 (The Secure Handshake):** Call this endpoint with `{\"filename\": \"pic.png\",
        \"content_type\": \"image/png\"}` to secure a ticket. It returns an `upload_url`
        and an `object_key`. Note: Ensure you store your `profile_id` returned from
        `GET /api/v1/profile` for all future social interactions.\\n\\n**Step 2 (The
        Direct Upload):** Bypass this backend entirely and upload your binary image
        file directly to AWS S3. Perform an HTTP `PUT` request targeting the `upload_url`
        you received. You MUST attach the exact same `Content-Type` header (e.g. `image/png`)
        to the `PUT` request. Do not send `FormData`, send raw binary data.\\n\\n**Step
        3 (Final Sync):** Once AWS gives you a `200 OK`, call `PUT /api/v1/profile`
        and set `\"profile_picture_url\"` to the `object_key` that was returned in
        Step 1. Your updated profile is now ready to be discovered via the public
        profile lookup."
      parameters:
      - description: File Info
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/profile.GenerateUploadURLReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Generate S3 Upload URL
      tags:
      - Profile
