definitions:
  domain.Attachment:
    properties:
      file_path:
        type: string
      id:
        type: string
      item_id:
        type: string
      uploaded_at:
        type: string
    type: object
  domain.Category:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  domain.CreateItemCommand:
    properties:
      category_id:
        type: string
      description:
        type: string
      object_keys:
        description: S3 keys pointing to uploaded images
        items:
          type: string
        type: array
      owner_id:
        type: string
      pickup_location:
        type: string
      price:
        type: number
      title:
        type: string
    type: object
  domain.FeedItem:
    properties:
      category_id:
        type: string
      category_name:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      owner_display_name:
        type: string
      owner_id:
        type: string
      owner_profile_pic_url:
        type: string
      pickup_location:
        type: string
      price:
        type: number
      status:
        $ref: '#/definitions/domain.ItemStatus'
      thumbnail_url:
        type: string
      title:
        type: string
    type: object
  domain.Follow:
    properties:
      displayName:
        type: string
      followedAt:
        type: string
      followerProfileID:
        type: string
      followingProfileID:
        type: string
      profilePictureURL:
        type: string
    type: object
  domain.Item:
    properties:
      category_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      owner_id:
        type: string
      pickup_location:
        type: string
      price:
        type: number
      status:
        $ref: '#/definitions/domain.ItemStatus'
      title:
        type: string
      updated_at:
        type: string
    type: object
  domain.ItemDetail:
    properties:
      attachments:
        items:
          $ref: '#/definitions/domain.Attachment'
        type: array
      category_id:
        type: string
      category_name:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      owner_display_name:
        type: string
      owner_id:
        type: string
      owner_profile_pic_url:
        type: string
      pickup_location:
        type: string
      price:
        type: number
      status:
        $ref: '#/definitions/domain.ItemStatus'
      thumbnail_url:
        type: string
      title:
        type: string
    type: object
  domain.ItemStatus:
    enum:
    - AVAILABLE
    - RESERVED
    - SOLD
    type: string
    x-enum-varnames:
    - ItemStatusAvailable
    - ItemStatusReserved
    - ItemStatusSold
  domain.Notification:
    properties:
      createdAt:
        type: string
      is_read:
        type: boolean
      notificationID:
        type: string
      payload:
        type: object
      type:
        $ref: '#/definitions/domain.NotificationType'
      userID:
        type: string
    type: object
  domain.NotificationType:
    enum:
    - TURN_STARTED
    - TURN_ACCEPTED
    - HANDOFF_INITIATED
    - GIVEAWAY_COMPLETED
    - TURN_EXPIRED
    - GIVEAWAY_CANCELLED
    - PURCHASE_REQUESTED
    - PURCHASE_ACCEPTED
    - PURCHASE_REJECTED
    - TRANSACTION_COMPLETED
    - CHAT_MESSAGE
    - USER_JOINED_QUEUE
    - APPLICATION_APPROVED
    - APPLICATION_REJECTED
    - RATING_REMINDER
    type: string
    x-enum-varnames:
    - NotifTypeTurnStarted
    - NotifTypeTurnAccepted
    - NotifTypeHandoffInitiated
    - NotifTypeGiveawayCompleted
    - NotifTypeTurnExpired
    - NotifTypeGiveawayCancelled
    - NotifTypePurchaseRequested
    - NotifTypePurchaseAccepted
    - NotifTypePurchaseRejected
    - NotifTypeTransactionDone
    - NotifTypeChatMessage
    - NotifTypeUserJoinedQueue
    - NotifTypeApplicationApproved
    - NotifTypeApplicationRejected
    - NotifTypeRatingReminder
  domain.PendingRating:
    properties:
      buyer_id:
        type: string
      days_since_completion:
        type: integer
      item_id:
        type: string
      item_title:
        type: string
      seller_id:
        type: string
      seller_name:
        type: string
      transaction_id:
        type: string
    type: object
  domain.ProviderApplication:
    properties:
      address:
        type: string
      admin_comment:
        type: string
      applicant_id:
        type: string
      business_name:
        type: string
      business_type:
        type: string
      id:
        type: string
      phone_number:
        type: string
      reviewed_at:
        type: string
      reviewed_by_admin_id:
        type: string
      status:
        type: string
      submitted_at:
        type: string
      university_id:
        type: string
    type: object
  domain.PurchaseRequest:
    properties:
      buyerID:
        type: string
      buyerName:
        type: string
      buyerPic:
        type: string
      createdAt:
        type: string
      itemID:
        type: string
      itemImage:
        type: string
      itemPrice:
        format: float64
        type: number
      itemTitle:
        description: Hydrated fields
        type: string
      requestID:
        type: string
      status:
        $ref: '#/definitions/domain.PurchaseRequestStatus'
      transactionId:
        type: string
      updatedAt:
        type: string
    type: object
  domain.PurchaseRequestStatus:
    enum:
    - PENDING
    - ACCEPTED
    - PENDING_TX
    - REJECTED
    - FROZEN
    - CANCELLED
    - COMPLETED
    type: string
    x-enum-varnames:
    - PurchaseRequestPending
    - PurchaseRequestAccepted
    - PurchaseRequestPendingTx
    - PurchaseRequestRejected
    - PurchaseRequestFrozen
    - PurchaseRequestCancelled
    - PurchaseRequestCompleted
  domain.QueueEntry:
    properties:
      buyerName:
        type: string
      buyerPic:
        type: string
      entryID:
        type: string
      entryStatus:
        $ref: '#/definitions/domain.QueueEntryStatus'
      itemID:
        type: string
      joinedAt:
        type: string
      turnStartedAt:
        type: string
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  domain.QueueEntryStatus:
    enum:
    - WAITING
    - RESERVED
    - CONFIRMED
    - HANDED_OFF
    - EXPIRED
    - COMPLETED
    - CANCELLED
    type: string
    x-enum-varnames:
    - QueueStatusWaiting
    - QueueStatusReserved
    - QueueStatusConfirmed
    - QueueStatusHandedOff
    - QueueStatusExpired
    - QueueStatusCompleted
    - QueueStatusCancelled
  domain.QueuePosition:
    properties:
      entry:
        $ref: '#/definitions/domain.QueueEntry'
      position:
        type: integer
      total:
        type: integer
    type: object
  domain.Rating:
    properties:
      comment:
        type: string
      created_at:
        type: string
      is_frozen:
        type: boolean
      rated_user_id:
        type: string
      rater_id:
        type: string
      rating_id:
        type: string
      stars:
        type: integer
      transaction_id:
        type: string
    type: object
  domain.Review:
    properties:
      comment:
        type: string
      created_at:
        type: string
      rater_name:
        type: string
      rating_id:
        type: string
      stars:
        type: integer
    type: object
  dto.CompleteProviderRegistrationRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.CompleteStudentRegistrationRequest:
    properties:
      academicYear:
        type: integer
      displayName:
        type: string
      email:
        type: string
      major:
        type: string
      password:
        type: string
    type: object
  dto.ConfirmDocumentUploadRequest:
    properties:
      content_type:
        type: string
      document_type:
        type: string
      object_key:
        type: string
      original_filename:
        type: string
      size_bytes:
        type: integer
    required:
    - content_type
    - document_type
    - object_key
    - original_filename
    - size_bytes
    type: object
  dto.GetDocumentUploadURLRequest:
    properties:
      content_type:
        type: string
      document_type:
        type: string
      original_filename:
        type: string
    required:
    - content_type
    - document_type
    - original_filename
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.LoginUser'
    type: object
  dto.LoginUser:
    properties:
      email:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  dto.MeResponse:
    description: Current authenticated user
    properties:
      email:
        example: user@bzu.edu
        type: string
      id:
        example: b3c2f9a1
        type: string
      role:
        example: STUDENT
        type: string
    type: object
  dto.RefreshRequest:
    properties:
      refreshToken:
        type: string
    type: object
  dto.RefreshResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  dto.RejectProviderApplicationRequest:
    properties:
      comment:
        type: string
    required:
    - comment
    type: object
  dto.RequestActivationRequest:
    properties:
      email:
        type: string
    type: object
  dto.ResendActivationRequest:
    properties:
      email:
        type: string
    type: object
  dto.StartProviderApplicationRequest:
    properties:
      address:
        type: string
      business_name:
        type: string
      business_type:
        type: string
      phone_number:
        type: string
      university_id:
        type: string
    required:
    - address
    - business_name
    - business_type
    - phone_number
    - university_id
    type: object
  dto.StudentRegistrationStatusResponse:
    properties:
      can_complete_registration:
        type: boolean
      email:
        type: string
      expires_at:
        type: string
      is_used:
        type: boolean
      is_verified:
        type: boolean
      verified_at:
        type: string
    type: object
  giveaway.AcceptResponse:
    properties:
      transactionId:
        type: string
    type: object
  http.CreateRatingRequest:
    properties:
      comment:
        type: string
      stars:
        type: integer
    type: object
  http.SendChatNotificationRequest:
    properties:
      item_id:
        type: string
      receiver_id:
        type: string
      room_id:
        type: string
    type: object
  middleware.ErrCode:
    enum:
    - USER_NOT_FOUND
    - EMAIL_ALREADY_USED
    - INVALID_CREDENTIALS
    - ACCOUNT_SUSPENDED
    - EMAIL_NOT_VERIFIED
    - UNAUTHORIZED
    - FORBIDDEN
    - TOKEN_INVALID
    - TOKEN_EXPIRED
    - LISTING_NOT_FOUND
    - LISTING_CLOSED
    - LISTING_LIMIT_REACHED
    - ALREADY_REVIEWED
    - REVIEW_NOT_ALLOWED
    - VALIDATION_FAILED
    - INVALID_INPUT
    - CONFLICT
    - RATE_LIMITED
    - DATABASE_ERROR
    - INTERNAL_ERROR
    type: string
    x-enum-varnames:
    - CodeUserNotFound
    - CodeEmailAlreadyUsed
    - CodeInvalidCredentials
    - CodeAccountSuspended
    - CodeEmailNotVerified
    - CodeUnauthorized
    - CodeForbidden
    - CodeTokenInvalid
    - CodeTokenExpired
    - CodeListingNotFound
    - CodeListingClosed
    - CodeListingLimitReached
    - CodeAlreadyReviewed
    - CodeReviewNotAllowed
    - CodeValidationFailed
    - CodeInvalidInput
    - CodeConflict
    - CodeRateLimited
    - CodeDatabaseError
    - CodeInternalError
  middleware.ErrorFrame:
    properties:
      code:
        $ref: '#/definitions/middleware.ErrCode'
      correlationId:
        type: string
      details:
        additionalProperties: {}
        type: object
      message:
        type: string
      retryable:
        type: boolean
      statusCode:
        type: integer
      ts:
        type: integer
      type:
        type: string
      version:
        type: string
    type: object
  profile.GenerateUploadURLReq:
    properties:
      content_type:
        type: string
      file_size:
        type: integer
      filename:
        type: string
    type: object
  profile.UpdateDeviceTokenReq:
    properties:
      token:
        type: string
    type: object
  profile.UpdateProfileReq:
    properties:
      bio:
        type: string
      display_name:
        type: string
      profile_picture_url:
        type: string
    type: object
  profile.UpdateStudentReq:
    properties:
      academic_year:
        type: integer
      major:
        type: string
    type: object
  services.ProfileDTO:
    properties:
      academic_year:
        type: integer
      bio:
        type: string
      display_name:
        type: string
      display_name_last_changed_at:
        type: string
      email:
        type: string
      follower_count:
        type: integer
      following_count:
        type: integer
      major:
        description: Student specific
        type: string
      profile_id:
        type: string
      profile_picture_url:
        type: string
      rating_count:
        type: integer
      role:
        type: string
      sold_items_count:
        type: integer
      student_id:
        type: string
      total_reviews_count:
        type: integer
      user_id:
        type: string
    type: object
info:
  contact:
    name: Amro Deek
  description: Dealna backend API
  title: Dealna API
  version: "1.0"
paths:
  /api/v1/auth/admin/providers/{id}/approve:
    post:
      consumes:
      - application/json
      description: |-
        Approves a provider application and upgrades the applicant to a PROVIDER role
        Gets the current status of the logged in user's provider application
      parameters:
      - description: Applicant ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ProviderApplication'
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      - BearerAuth: []
      summary: Get provider application status
      tags:
      - Admin
      - Provider Registration
  /api/v1/auth/admin/providers/{id}/reject:
    post:
      consumes:
      - application/json
      description: Rejects a provider application and provides a comment
      parameters:
      - description: Applicant ID
        in: path
        name: id
        required: true
        type: string
      - description: Rejection Details
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RejectProviderApplicationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Reject provider application
      tags:
      - Admin
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user via Keycloak and return access & refresh tokens
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Login
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke current session
      parameters:
      - description: Refresh payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /api/v1/auth/providers/activate:
    get:
      description: Check activation link validity
      parameters:
      - description: Activation token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Verify provider activation token
      tags:
      - Auth
  /api/v1/auth/providers/application/document-url:
    post:
      consumes:
      - application/json
      description: Get an S3 presigned URL to upload a document
      parameters:
      - description: Document details
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.GetDocumentUploadURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Get document upload URL
      tags:
      - Auth
  /api/v1/auth/providers/application/document/confirm:
    post:
      consumes:
      - application/json
      description: Confirms that a document was uploaded successfully
      parameters:
      - description: Document details
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ConfirmDocumentUploadRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Confirm document upload
      tags:
      - Auth
  /api/v1/auth/providers/application/start:
    post:
      consumes:
      - application/json
      description: Creates a DRAFT application for the provider
      parameters:
      - description: Application details
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.StartProviderApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Start provider application
      tags:
      - Auth
  /api/v1/auth/providers/application/status:
    get:
      consumes:
      - application/json
      description: |-
        Approves a provider application and upgrades the applicant to a PROVIDER role
        Gets the current status of the logged in user's provider application
      parameters:
      - description: Applicant ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ProviderApplication'
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      - BearerAuth: []
      summary: Get provider application status
      tags:
      - Admin
      - Provider Registration
  /api/v1/auth/providers/application/submit:
    post:
      consumes:
      - application/json
      description: Submits the application for review
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Submit provider application
      tags:
      - Auth
  /api/v1/auth/providers/complete:
    post:
      consumes:
      - application/json
      description: Finalize provider account
      parameters:
      - description: Registration data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CompleteProviderRegistrationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Complete provider registration
      tags:
      - Auth
  /api/v1/auth/providers/request-activation:
    post:
      consumes:
      - application/json
      description: Start provider registration process and send verification email
      parameters:
      - description: Registration data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RequestActivationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Request provider activation
      tags:
      - Auth
  /api/v1/auth/providers/resend:
    post:
      consumes:
      - application/json
      description: Resend activation email for provider
      parameters:
      - description: Email
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RequestActivationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Resend activation link
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      parameters:
      - description: Refresh payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Refresh token
      tags:
      - Auth
  /api/v1/auth/student/activate:
    get:
      description: Check activation link validity
      parameters:
      - description: Activation token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      summary: Verify activation token
      tags:
      - Auth
  /api/v1/auth/student/complete:
    post:
      consumes:
      - application/json
      description: Finalize student account
      parameters:
      - description: Registration data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CompleteStudentRegistrationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
