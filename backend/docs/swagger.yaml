            items:
              $ref: '#/definitions/domain.PurchaseRequest'
            type: array
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get my purchase requests
      tags:
      - Purchases
  /api/v1/transactions/{transactionId}/cancel:
    post:
      description: Allows the buyer or seller to cancel a transaction
      parameters:
      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: string
      responses:
        "200":
          description: 'Returns { \"message\": \"Cancelled\" }'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Cancel a transaction
      tags:
      - Transactions
  /api/v1/transactions/{transactionId}/confirm-buyer:
    post:
      description: Allows the buyer to confirm they received the item
      parameters:
      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: string
      responses:
        "200":
          description: 'Returns { \"message\": \"Confirmed\" }'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Confirm a transaction (Buyer)
      tags:
      - Transactions
  /api/v1/transactions/{transactionId}/confirm-seller:
    post:
      description: Allows the seller to confirm they handed off the item
      parameters:
      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: string
      responses:
        "200":
          description: 'Returns { \"message\": \"Confirmed\" }'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Confirm a transaction (Seller)
      tags:
      - Transactions
  /api/v1/transactions/{transactionId}/rate:
    post:
      consumes:
      - application/json
      description: Allows a buyer to rate a seller after a completed transaction.
      parameters:
      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: string
      - description: Rating details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CreateRatingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Rating'
        "400":
          description: Invalid input or not allowed
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create a rating
      tags:
      - Ratings
  /api/v1/users/{profileId}/profile:
    get:
      description: Fetch public-facing info of any user (display name, bio, counters).
        Use this to render the profile page of others before a follow action.
      parameters:
      - description: Profile ID
        in: path
        name: profileId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.ProfileDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: '[Public] Discover User'
      tags:
      - Social
  /api/v1/users/{profileId}/profile-by-user:
    get:
      description: Fetch the public profile of an item owner using their user ID (the
        owner_id field returned in the feed). Use this when clicking on an item to
        show the seller's profile.
      parameters:
      - description: User ID (owner_id from the item feed)
        in: path
        name: profileId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.ProfileDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: '[Public] Get Owner Profile by User ID'
      tags:
      - Social
  /api/v1/users/{userId}/ratings:
    get:
      description: Fetches a list of public reviews left by buyers for a specific
        user (seller).
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Review'
            type: array
        "400":
          description: Invalid user ID
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get user reviews
      tags:
      - Ratings
  /api/v1/users/me:
    get:
      description: Returns authenticated user profile -test
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorFrame'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Users
  /api/v1/users/me/pending-ratings:
    get:
      description: Fetches a list of completed transactions where the logged-in buyer
        has not yet submitted a rating.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.PendingRating'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get pending ratings
      tags:
      - Ratings
  /giveaway/notifications:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of notifications for the current user
      parameters:
      - default: 50
        description: limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Notification'
            type: array
      security:
      - BearerAuth: []
      summary: Get user notifications
      tags:
      - notifications
  /giveaway/notifications/{notificationId}/read:
    post:
      consumes:
      - application/json
      description: Marks a specific notification as read for the current user
      parameters:
      - description: Notification ID
        in: path
        name: notificationId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Mark notification as read
      tags:
      - notifications
  /giveaway/notifications/unread-count:
    get:
      consumes:
      - application/json
      description: Returns the number of unread notifications for the user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
      security:
      - BearerAuth: []
      summary: Get unread notification count
      tags:
      - notifications
  /users/{profileId}/follow:
    post:
      description: Authenticated user follows the profile with the given profileId
      parameters:
      - description: Target profile ID
        in: path
        name: profileId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: cannot follow yourself
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Follow a user
      tags:
      - Social
  /users/{profileId}/followers:
    get:
      description: Returns all profiles following the given profileId
      parameters:
      - description: Profile ID
        in: path
        name: profileId
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Follow'
            type: array
        "500":
          description: internal error
          schema:
            type: string
      summary: Get followers
      tags:
      - Social
  /users/{profileId}/following:
    get:
      description: Returns all profiles that the given profileId follows
      parameters:
      - description: Profile ID
        in: path
        name: profileId
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Follow'
            type: array
        "500":
          description: internal error
          schema:
            type: string
      summary: Get following
      tags:
      - Social
  /users/{profileId}/is-following:
    get:
      description: Returns whether the authenticated user follows the given profile
      parameters:
      - description: Target profile ID
        in: path
        name: profileId
        required: true
        type: string
      responses:
        "200":
          description: 'Returns { \"is_following\": boolean }'
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Check follow status
      tags:
      - Social
  /users/{profileId}/unfollow:
    delete:
      description: Authenticated user unfollows the profile with the given profileId
      parameters:
      - description: Target profile ID
        in: path
        name: profileId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Unfollow a user
      tags:
      - Social
securityDefinitions:
  BearerAuth:
    in: header
